spring.application.name=sistema-upa
spring.config.import=optional:file:./application-local.properties,optional:file:./backend/application-local.properties

server.address=0.0.0.0
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/sistema-upa}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

app.frontend.url=${FRONTEND_URL:http://127.0.0.1:5500}
app.admin.email=${ADMIN_EMAIL:admin@upa.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
